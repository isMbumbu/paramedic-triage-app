services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage
      POSTGRES_DB: triage
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    environment:
      TRIAGE_DATABASE_URL: postgresql+asyncpg://triage:triage@postgres:5432/triage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres-data:
